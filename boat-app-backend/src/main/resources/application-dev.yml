spring:
  datasource:
    url: jdbc:postgresql://localhost:5432/boatdb
    driver-class-name: org.postgresql.Driver
    username: ${POSTGRES_USER:boat}
    password: ${POSTGRES_PASSWORD:boat}

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.PostgreSQLDialect
    properties:
      hibernate:
        format_sql: true

# Actuator — full health details for local debugging
management:
  endpoint:
    health:
      show-details: always

# Verbose logging for the application package in dev
logging:
  level:
    com.boatapp: DEBUG
