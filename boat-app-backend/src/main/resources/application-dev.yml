spring:
  datasource:
    url: jdbc:h2:mem:boatdb;DB_CLOSE_DELAY=-1;DB_CLOSE_ON_EXIT=FALSE
    driver-class-name: org.h2.Driver
    username: sa
    password:

  h2:
    console:
      enabled: true
      path: /h2-console

  jpa:
    show-sql: true
    hibernate:
      ddl-auto: create-drop
    database-platform: org.hibernate.dialect.H2Dialect

# Actuator — full health details for local debugging
management:
  endpoint:
    health:
      show-details: always

# Verbose logging for the application package in dev
logging:
  level:
    com.boatapp: DEBUG

