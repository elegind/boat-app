spring:
  application:
    name: boat-app-backend

  # Default active profile — override via env var SPRING_PROFILES_ACTIVE in production
  profiles:
    active: dev

  # JWT resource server — two separate properties to handle the Docker networking split:
  #   jwk-set-uri  → where to FETCH the public keys  (internal Docker URL in prod/docker)
  #   keycloak.issuer-uri → the iss claim value in the token (always the browser-visible URL)
  # In local dev both default to localhost:9000.
  security:
    oauth2:
      resourceserver:
        jwt:
          jwk-set-uri: ${KEYCLOAK_JWK_SET_URI:http://localhost:9000/realms/boat-app/protocol/openid-connect/certs}

keycloak:
  issuer-uri: ${KEYCLOAK_ISSUER_URI:http://localhost:9000/realms/boat-app}

  # JPA — conservative defaults for production
  jpa:
    show-sql: false
    hibernate:
      ddl-auto: validate
    properties:
      hibernate:
        jdbc:
          time_zone: UTC

  # Jackson — serialize dates as ISO-8601 strings, not arrays
  jackson:
    serialization:
      write-dates-as-timestamps: false

# Actuator — expose relevant endpoints; details restricted in production
management:
  endpoints:
    web:
      exposure:
        include: health, info, metrics
  endpoint:
    health:
      # Production: status only (no sensitive infrastructure details)
      show-details: never
